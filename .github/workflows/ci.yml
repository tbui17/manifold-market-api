name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # plugin:validate runs tsc + validates the generated plugin metadata
      # against openclaw.plugin.json. Catches manifest drift and type errors.
      - name: Build & validate plugin
        run: npm run plugin:validate

      # Live integration tests hit the Manifold API. Public reads and error
      # shape tests run unconditionally; authed tests skip without MANIFOLD_API_KEY.
      - name: Test
        run: npm test
